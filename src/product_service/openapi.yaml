openapi: 3.0.3
info:
  title: Product Service API
  version: 1.0.0
  description: API for managing products

servers:
  - url: http://192.168.1.24:8080

paths:
  /products:
    post:
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    get:
      operationId: getProducts
      parameters:
        - name: page
          in: query
          description: Page number (starting from 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProductStatus'
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paged product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /products/{id}:
    get:
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

    put:
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    delete:
      operationId: archiveProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product archived

components:
  schemas:

    Product:
      type: object
      required:
        - id
        - name
        - status
        - category
        - price
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        price:
          type: string
          format: decimal
          example: "199.99"
          description: Decimal price with arbitrary precision. Must be grater than zero.
        status:
          $ref: '#/components/schemas/ProductStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductCreateRequest:
      type: object
      required:
        - name
        - category
        - price
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        price:
          type: string
          format: decimal
          example: "199.99"

    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        price:
          type: string
          format: decimal
          example: "149.99"
        status:
          $ref: '#/components/schemas/ProductStatus'

    ProductPage:
      type: object
      required:
        - content
        - totalElements
        - page
        - size
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        totalElements:
          type: integer
          minimum: 0
          example: 150
        page:
          type: integer
          minimum: 0
          example: 0
        size:
          type: integer
          minimum: 0
          example: 20

    ProductStatus:
      type: string
      enum:
        - DRAFT
        - ACTIVE
        - ARCHIVED
